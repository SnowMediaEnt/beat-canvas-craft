[install]
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = ["@lovable.dev/vite-tanstack-config", "@remotion/cli", "@remotion/lambda", "@remotion/lambda-client", "@remotion/media-utils", "@remotion/renderer", "remotion"]
